services:
  - type: web
    name: connectome-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CONNECTOME_API_BASE
        value: https://connectome-api-production.up.railway.app
      - key: CONNECTOME_REPO_DIR
        value: /app
      - key: CONNECTOME_RUNTIME_DIR
        value: /tmp/connectome
      - key: CORS_ORIGINS
        value: '["https://atdao.org","https://www.atdao.org","https://avielcarlos.github.io"]'
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ORA_JWT_TOKEN
        sync: false
      - key: CONNECTOME_WORKER_JWT
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ORA_TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: FEEDBACK_SCREENSHOT_STORAGE_BACKEND
        value: s3
      - key: FEEDBACK_SCREENSHOT_S3_BUCKET
        sync: false
      - key: FEEDBACK_SCREENSHOT_S3_ENDPOINT_URL
        sync: false
      - key: FEEDBACK_SCREENSHOT_S3_ACCESS_KEY_ID
        sync: false
      - key: FEEDBACK_SCREENSHOT_S3_SECRET_ACCESS_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: connectome-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: connectome-redis
          type: redis
          property: connectionString

databases:
  - name: connectome-db
    plan: free
    databaseName: connectome
    user: connectome

  - name: connectome-redis
    plan: free
    type: redis

name: Secret guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  no-public-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Block live secrets and private notes in public files
        run: python scripts/guard_no_public_secrets.py
